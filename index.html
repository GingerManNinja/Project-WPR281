<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bug Tracking System</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

  <div class="container">
    <header class="dashboard-header">
      <div>
        <h1>Bug Tracking System</h1>
        <p>Issue Dashboard</p>
      </div>
    </header>

    <section class="dashboard-card">

      <div class="card-top">
        <h2>All Issues</h2>

        <div class="top-actions">
          <span class="issue-count">0 Issues</span>
          <button id="sortPriorityBtn" class="create-btn">Sort by Priority</button>
          <button id="newIssueBtn" class="create-btn">+ New Issue</button>
        </div>
      </div>

      <div class="search-container">
        <input type="text" id="issueSearch" placeholder="Search issues..." class="search-input">
      </div>

      <div class="status-summary">
        <div class="status-box all" id="allFilter">
          <span>All</span>
          <p>Show All</p>
        </div>

        <div class="status-box open" id="openFilter">
          <span id="openCount">0</span>
          <p>Open</p>
        </div>

        <div class="status-box resolved" id="resolvedFilter">
          <span id="resolvedCount">0</span>
          <p>Resolved</p>
        </div>

        <div class="status-box overdue" id="overdueFilter">
          <span id="overdueCount">0</span>
          <p>Overdue</p>
        </div>
      </div>

      <div class="table-wrapper">
        <table class="issue-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Summary</th>
              <th>Project</th>
              <th>Assigned To</th>
              <th>Status</th>
              <th>Priority</th>
            </tr>
          </thead>
          <tbody id="issueList"></tbody>
        </table>
      </div>

      <div class="issue-details" id="issueDetails">
        <h3>Issue Details</h3>
        <p>Select an issue to see full details.</p>
      </div>

    </section>

    <div id="popupForm" class="newIssueForm-container">
      <form>
        <h2 id="popupFormTitle">New Issue:</h2>

        <label for="summary">Summary:</label>
        <input type="text" id="summary" required>

        <label for="description">Description:</label>
        <input type="text" id="description" required>

        <label for="project">Project:</label>
        <input type="text" id="project" required>

        <label for="assignedTo">Assigned To:</label>
        <select id="assignedTo" required>
          <option value="" disabled selected>Select an option</option>
          <option value="Tanya">Tanya</option>
          <option value="John">John</option>
          <option value="Sarah">Sarah</option>
          <option value="Michael">Michael</option>
          <option value="Emily">Emily</option>
          <option value="Oliver">Oliver</option>
          <option value="Naledi">Naledi</option>
        </select>

        <label for="status">Status:</label>
        <select id="status" required>
          <option value="" disabled selected>Select an option</option>
          <option value="Open">Open</option>
          <option value="Resolved">Resolved</option>
          <option value="Overdue">Overdue</option>
        </select>

        <label for="priority">Priority:</label>
        <select id="priority" required>
          <option value="" disabled selected>Select an option</option>
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
        </select>

        <label for="dateReported">Date Reported:</label>
        <input type="date" id="dateReported" required>

        <label for="targetResolutionDate">Target Resolution Date:</label>
        <input type="date" min="2026-01-01" id="targetResolutionDate" required>

        <label for="actualResolutionDate">Actual Resolution Date:</label>
        <input type="date" id="actualResolutionDate">

        <label for="resolutionSummary">Resolution Summary:</label>
        <input type="text" id="resolutionSummary" required>

        <button type="submit" id="submitBtn">Submit</button>
        <button type="button" id="closeFormBtn">Close</button>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
    <script src="functionality.js"></script>
  </div>
</body>

</html>
